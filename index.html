<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Document</title>
</head>
<body>
    <h1>Heat Index Checker</h1>

    <br>


    <form>
        <label>Degree in °C</label>
            <input type="number" id="deg" class="form-control" placeholder="Input degree value">

        <br>
        
        <label>Humidity in %</label>
            <input type="number" id="humid" class="form-control" placeholder="Input percentage value">

        <br>

        <button type="button" class="btn btn-warning" onclick="showindex()">Check</button>
    </form>

    <script>
        function showindex() {
            let temperature, humid, range, status = ;
            humidity = parseFloat(document.getElementById("humid").value);
            temp = parseFloat(document.getElementById("deg").value);
            

            heatindex = temp + (0.33 * humidity) - 4; 

            status = "";

                switch(true){
                    case(range <= 27):
                        status = " Comfortable / Cool";
                        break;

                    case(range <= 32):
                        status = " Warm";
                        break;
                    
                    case(range <= 37):
                        status = "Hot";
                        break;

                    case(range <= 41):
                        status = "Very Hot / Caution";
                        break;
                    
                    case(range >= 42):
                        status = "Extreme Heat / Danger";
                        break;
                    
                    default:
                        status = "invalid input";
                        break;
                }
            alert("Heat Index: " + heatindex + "°C" + "Status: " + status);
        }
    </script>
    
</body>
</html>
