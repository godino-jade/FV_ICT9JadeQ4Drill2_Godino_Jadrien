<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Document</title>

    <style>
        body{
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-image: url(https://studyfinds.com/wp-content/uploads/2022/02/Heat-thermometer-shows-the-temperature-is-hot-in-the-sky-Summer-1200x797.jpeg?ver=1705604524);
            background-repeat: no-repeat;
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
        }
        .container-fluid{
            width: 50%;
            margin: auto;
            background-color: rgb(39, 39, 39);
            color: white;
            border-radius: 20px;
            padding: 20px;
            position: center;
            box-shadow: 5px 5px 15px 5px #0000006d
        }

        label{
            font-weight: bold;
        }

        h1{
            color: orange;
        }

    </style>
</head>
<body>
    <div class="container-fluid">
        <h1>Heat Index Checker</h1>
        <details ontoggle="instructions()">
            <summary><b>Note: </b></summary>

            <div id="instructions"></div> 
        </details>

        <br>

        <form>
            <label>Degree in °C</label>
                <input type="number" id="deg" class="form-control" placeholder="Input degree value">

            <br>
            
            <label>Humidity in %</label>
                <input type="number" id="perc" class="form-control" placeholder="Input percentage value">

            <br>

            <button type="button" class="btn btn-warning" onclick="showindex()">Check</button>
        </form>
    </div>

    <script>
       function showindex(){
        let temp, humidity, HI, status  //assigns values to the variables
        
        temp = parseFloat(document.getElementById("deg").value); //gets temp from the input coming from the Degree in °C
        humidity = parseFloat(document.getElementById("perc").value); //gets humidity from the input coming from the Humidity in %

        HI = temp + (0.33 * humidity) - 4; //formula for the heat index
 
         switch(true){
            case(HI <= 27):
                status = "Comfortable/cool";
                break; 

            case(HI >= 28 && HI <= 32):
                status = "Warm";
                break; 

            case(HI >= 33 && HI <= 37):
                status = "Hot";
                break; 

            case(HI >= 38 && HI <= 41):
                status = "Very Hot/Caution";
                break;

            case(HI >= 42):
                status = "Extreme Heat/Danger";
                break;

            default: 
                status = "Undetermined"; 
            }

            alert("Heat Index: " + HI.toFixed(1) + "C°\n" + "Status: " + status); //pops up the status of heat index using alert and the concatenation
        }

        function instructions(){
			document.getElementById("instructions").innerHTML = 
			"<p>Input the temperature <i>(°C)</i> and humidity <i>(%)</i>, then click the Check button to see your heat index and its status.</p>"
		}
    </script>
</body>
</html>
