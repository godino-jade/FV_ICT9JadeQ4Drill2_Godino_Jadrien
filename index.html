<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Document</title>
</head>
<body>
    <h1>Heat Index Checker</h1>

    <br>

    <form>
        <label>Degree in °C</label>
            <input type="number" id="deg" class="form-control" placeholder="Input degree value">

        <br>
        
        <label>Humidity in %</label>
            <input type="number" id="perc" class="form-control" placeholder="Input percentage value">

        <br>

        <button type="button" class="btn btn-warning" onclick="showindex()">Check</button>
    </form>

    <script>
       function showindex(){
        let temp, humidity, HI, status      
        
        temp = parseFloat(document.getElementById("deg").value);
        humidity = parseFloat(document.getElementById("perc").value);

        HI = temp + (0.33 * humidity) - 4;
 
         switch(true){
            case(HI <= 27):
                status = "Comfortable/cool";
                break; 

            case(HI >= 28 && HI <= 32):
                status = "Warm";
                break; 

            case(HI >= 33 && HI <= 37):
                status = "Hot";
                break; 

            case(HI >= 38 && HI <= 41):
                status = "Very Hot/Caution";
                break;

            case(HI >= 42):
                status = "Extreme Heat/Danger";
                break;

            default: 
                status = "Undetermined"; 
            }

            alert("Heat Index: " + HI.toFixed(1) + "C°\n" + "Status: " + status);
        }
    </script>
</body>
</html>
